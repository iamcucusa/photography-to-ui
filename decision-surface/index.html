<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Data Overview</title>
    <script>
      // Apply the persisted color mode before first paint. Dark is the
      // default (:root); only "light" sets the attribute.
      try {
        if (localStorage.getItem('cucusa-theme') === 'light') {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Data Overview</title>
    <script>
      // Deep-link restore: the site-root 404.html forwards unknown paths here
      // as ?p=<rest>. Rewrite the URL before any app code reads it, so
      // /case-study and /trial/... links survive static hosting.
      try {
        var params = new URLSearchParams(location.search)
        var p = params.get('p')
        if (p !== null) {
          history.replaceState(null, '', location.pathname + decodeURIComponent(p))
        }
      } catch {}
    </script>
    <script>
      // Apply the color mode before first paint. Each surface has its own
      // default and its own remembered choice: the case study opens light,
      // the app opens dark; a visitor's explicit toggle wins on return.
      // Runs after the ?p= restore above, so the pathname is already real.
      try {
        var isCaseStudy = /\/case-study\/?$/.test(location.pathname)
        var themeKey = isCaseStudy ? 'ds-theme-case-study' : 'ds-theme-app'
        var stored = localStorage.getItem(themeKey)
        var light = stored === 'light' || (stored === null && isCaseStudy)
        if (light) {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
